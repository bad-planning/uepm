name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      dry_run:
        description: 'Dry run (do not actually publish)'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version bump (dry run)
        if: ${{ inputs.dry_run }}
        run: |
          echo "=== DRY RUN MODE ==="
          echo "Would bump version: ${{ inputs.version_type }}"
          echo "Current versions:"
          echo "Core: $(node -p "require('./packages/core/package.json').version")"
          echo "Init: $(node -p "require('./packages/init/package.json').version")"
          echo "Postinstall: $(node -p "require('./packages/postinstall/package.json').version")"
          echo "Example Plugin: $(node -p "require('./samples/plugins/example-plugin/package.json').version")"
          echo "Dependency Plugin: $(node -p "require('./samples/plugins/dependency-plugin/package.json').version")"

      - name: Version bump and publish
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Function to bump version in package.json
          bump_version() {
            local package_dir=$1
            local version_type=$2
            
            cd "$package_dir"
            npm version $version_type --no-git-tag-version
            local new_version=$(node -p "require('./package.json').version")
            echo "Bumped $package_dir to $new_version"
            cd - > /dev/null
            echo $new_version
          }

          # Function to update dependency versions
          update_dependency() {
            local package_file=$1
            local dep_name=$2
            local new_version=$3
            
            # Update dependency version using node
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$package_file', 'utf8'));
              if (pkg.dependencies && pkg.dependencies['$dep_name']) {
                pkg.dependencies['$dep_name'] = '^$new_version';
              }
              if (pkg.devDependencies && pkg.devDependencies['$dep_name']) {
                pkg.devDependencies['$dep_name'] = '^$new_version';
              }
              fs.writeFileSync('$package_file', JSON.stringify(pkg, null, 2) + '\n');
            "
          }

          # Bump core package first (others depend on it)
          echo "=== Bumping @uepm/core ==="
          core_version=$(bump_version "packages/core" "${{ inputs.version_type }}")

          # Update core dependency in other packages
          update_dependency "packages/init/package.json" "@uepm/core" "$core_version"
          update_dependency "packages/postinstall/package.json" "@uepm/core" "$core_version"

          # Bump other packages
          echo "=== Bumping @uepm/init ==="
          init_version=$(bump_version "packages/init" "${{ inputs.version_type }}")

          echo "=== Bumping @uepm/postinstall ==="
          postinstall_version=$(bump_version "packages/postinstall" "${{ inputs.version_type }}")

          echo "=== Bumping @uepm/example-plugin ==="
          example_version=$(bump_version "samples/plugins/example-plugin" "${{ inputs.version_type }}")

          echo "=== Bumping @uepm/dependency-plugin ==="
          # Update example-plugin dependency first
          update_dependency "samples/plugins/dependency-plugin/package.json" "@uepm/example-plugin" "$example_version"
          dependency_version=$(bump_version "samples/plugins/dependency-plugin" "${{ inputs.version_type }}")

          # Update sample project dependencies
          update_dependency "samples/project/package.json" "@uepm/postinstall" "$postinstall_version"

          # Commit version changes
          git add .
          git commit -m "chore: bump versions to $core_version"
          git push

          # Build packages after version updates
          npm run build

          # Publish packages in dependency order
          echo "=== Publishing packages ==="
          
          echo "Publishing @uepm/core@$core_version"
          cd packages/core && npm publish --access public && cd ../..
          
          echo "Publishing @uepm/init@$init_version"
          cd packages/init && npm publish --access public && cd ../..
          
          echo "Publishing @uepm/postinstall@$postinstall_version"
          cd packages/postinstall && npm publish --access public && cd ../..
          
          echo "Publishing @uepm/example-plugin@$example_version"
          cd samples/plugins/example-plugin && npm publish --access public && cd ../../..
          
          echo "Publishing @uepm/dependency-plugin@$dependency_version"
          cd samples/plugins/dependency-plugin && npm publish --access public && cd ../../..

          # Create and push git tag
          git tag "v$core_version"
          git push origin "v$core_version"

          echo "=== Publication Summary ==="
          echo "@uepm/core: $core_version"
          echo "@uepm/init: $init_version"
          echo "@uepm/postinstall: $postinstall_version"
          echo "@uepm/example-plugin: $example_version"
          echo "@uepm/dependency-plugin: $dependency_version"