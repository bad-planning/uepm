name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: uepm-linux-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: uepm-windows-x86_64.exe
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: uepm-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: uepm-macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/uepm ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: Copy-Item "target/${{ matrix.target }}/release/uepm.exe" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Stamp CHANGELOG
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DATE=$(date +%Y-%m-%d)
          # Replace [Unreleased] heading with versioned heading
          sed -i "s/^## \[Unreleased\]/## [${VERSION}] - ${DATE}/" CHANGELOG.md
          # Add a fresh [Unreleased] section at the top
          sed -i "/^## \[${VERSION}\]/i ## [Unreleased]\n" CHANGELOG.md
          # Update the [Unreleased] comparison link
          sed -i "s|\[Unreleased\]:.*|[Unreleased]: https://github.com/adamschlesinger/uepm/compare/v${VERSION}...HEAD\n[${VERSION}]: https://github.com/adamschlesinger/uepm/compare/v$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo ${VERSION})...v${VERSION}|" CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: stamp CHANGELOG for ${GITHUB_REF_NAME}"
          git push origin HEAD:main

      - name: Extract release notes
        id: extract
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Extract the section for this version between its heading and the next
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md > release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: release_notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
